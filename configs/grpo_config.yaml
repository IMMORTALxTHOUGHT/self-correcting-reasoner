# GRPO Training Configuration
# Configuration for Group Relative Policy Optimization

# Model
model_path: "runs/sft"
load_in_4bit: true

# GRPO settings
num_generations: 8
beta: 0.1
temperature: 1.0
top_p: 0.95
top_k: -1

# Dataset
datasets:
  - path: "data/processed/gsm8k_train.jsonl"
    type: "json"
    field_messages: "messages"

# Training
sequence_len: 2048
max_steps: 500
micro_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.00001
lr_scheduler: "linear"
warmup_steps: 50
weight_decay: 0.01
epochs: 1

# Optimization
optim: "adamw_bnb_8bit"
bf16: true
fp16: false
gradient_checkpointing: true

# Checkpointing
output_dir: "runs/grpo"
save_steps: 50
save_total_limit: 3
logging_steps: 10

# Evaluation
eval_steps: 100
eval_strategy: "steps"

# Reproducibility
seed: 42

# Reward weights
reward_weights:
  format: 0.3
  self_correction: 0.3
  accuracy: 0.4

# Reporting
report_to:
  - "tensorboard"
  - "wandb"
